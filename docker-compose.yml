version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastfood-store-api
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=FastFoodStoreDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;
    depends_on:
      - sqlserver
    networks:
      - fastfood-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: fastfood-sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourPassword123!
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - fastfood-network

volumes:
  sqlserver_data:

networks:
  fastfood-network:
    driver: bridge
